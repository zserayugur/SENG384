
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .upload-page {
    min-height: 100vh;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8fcd4 50%, #f4f0ff 100%);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    pointer-events: none;
  }
  .blob-1 { width: 320px; height: 320px; background: #b0b0ff; top: -80px; left: -80px; }
  .blob-2 { width: 260px; height: 260px; background: #a8f0c0; bottom: -60px; right: -60px; }
  .blob-3 { width: 180px; height: 180px; background: #ffd6f0; top: 40%; left: 10%; }

  .page-header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .page-header .badge {
    display: inline-block;
    background: rgba(70, 70, 229, 0.1);
    color: #4646e5;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 16px;
    border: 1px solid rgba(70, 70, 229, 0.2);
  }

  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    color: #2a2a7a;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .page-header p {
    color: #6060aa;
    font-size: 15px;
    font-weight: 300;
  }

  .card {
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.85);
    border-radius: 28px;
    padding: 44px 48px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(70, 70, 229, 0.1), 0 4px 20px rgba(0,0,0,0.06);
    animation: fadeUp 0.7s 0.15s ease both;
  }

  .upload-zone {
    border: 2px dashed rgba(70, 70, 229, 0.3);
    border-radius: 18px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(70, 70, 229, 0.03);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover {
    border-color: rgba(70, 70, 229, 0.6);
    background: rgba(70, 70, 229, 0.06);
    transform: translateY(-2px);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #b9b9ff, #7f7fff);
    border-radius: 16px;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .upload-icon svg {
    width: 24px;
    height: 24px;
    stroke: white;
    fill: none;
  }

  .upload-zone h3 {
    font-size: 15px;
    font-weight: 500;
    color: #2a2a7a;
    margin-bottom: 6px;
  }

  .upload-zone p {
    font-size: 13px;
    color: #8888bb;
    font-weight: 300;
  }

  .file-name {
    font-size: 12px;
    color: #4646e5;
    margin-top: 8px;
    font-weight: 500;
    min-height: 18px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #6060aa;
    margin-bottom: 10px;
    display: block;
  }

  .transform-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .transform-option {
    position: relative;
    cursor: pointer;
  }

  .transform-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }

  .transform-option label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1.5px solid rgba(70, 70, 229, 0.15);
    font-size: 13px;
    font-weight: 400;
    color: #4a4a8a;
    cursor: pointer;
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.6);
    white-space: nowrap;
  }

  .transform-option label .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d0d0f0;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .transform-option input:checked + label {
    border-color: #4646e5;
    background: rgba(70, 70, 229, 0.08);
    color: #4646e5;
    font-weight: 500;
  }

  .transform-option input:checked + label .dot {
    background: #4646e5;
  }

  .transform-option label:hover {
    border-color: rgba(70, 70, 229, 0.4);
    background: rgba(70, 70, 229, 0.05);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #6060e5, #4646e5);
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.3px;
    box-shadow: 0 6px 24px rgba(70, 70, 229, 0.35);
  }

  .submit-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 32px rgba(70, 70, 229, 0.45);
    background: linear-gradient(135deg, #7070f0, #5555ee);
  }

  .submit-btn:active {
    transform: translateY(-1px);
  }

  .submit-btn svg {
    width: 18px;
    height: 18px;
    stroke: white;
    fill: none;
    transition: transform 0.3s;
  }

  .submit-btn:hover svg {
    transform: translateX(4px);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
{% include 'base.html' %}
<div class="upload-page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="page-header">
    <div class="badge">Face Transform Studio</div>
    <h1>Transform Your Face</h1>
    <p>Upload a photo and choose a transformation to get started</p>
  </div>

  <div class="card">
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.8">
          <polyline points="16 16 12 12 8 16"></polyline>
          <line x1="12" y1="12" x2="12" y2="21"></line>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
        </svg>
      </div>
      <h3>Drop your image here</h3>
      <p>or click to browse · JPG, PNG, WEBP</p>
      <div class="file-name" id="fileName"></div>
    </div>

    <span class="field-label">Choose a transformation</span>
    <div class="transform-grid">
      <div class="transform-option">
        <input type="radio" name="operation" id="opt1" value="Smile Enhancement" checked>
        <label for="opt1"><span class="dot"></span>Smile Enhance</label>
      </div>
      <div class="transform-option">
        <input type="radio" name="operation" id="opt2" value="Eyebrow Raising">
        <label for="opt2"><span class="dot"></span>Eyebrow Raise</label>
      </div>
      <div class="transform-option">
        <input type="radio" name="operation" id="opt3" value="Lip Widening">
        <label for="opt3"><span class="dot"></span>Lip Widening</label>
      </div>
      <div class="transform-option">
        <input type="radio" name="operation" id="opt4" value="Face Slimming">
        <label for="opt4"><span class="dot"></span>Face Slimming</label>
      </div>
      <div class="transform-option">
        <input type="radio" name="operation" id="opt5" value="Aging">
        <label for="opt5"><span class="dot"></span>Aging</label>
      </div>
      <div class="transform-option">
        <input type="radio" name="operation" id="opt6" value="De-Aging">
        <label for="opt6"><span class="dot"></span>De-Aging</label>
      </div>
    </div>

    <button class="submit-btn" type="button" onclick="handleSubmit()">
      Upload & Continue
      <svg viewBox="0 0 24 24" stroke-width="2">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </div>
</div>

<script>
function handleFile(e) {
  const file = e.target.files[0];
  if (file) {
    document.getElementById('fileName').textContent = file.name;
    const zone = document.getElementById('uploadZone');
    zone.style.borderColor = 'rgba(70,70,229,0.7)';
    zone.style.background = 'rgba(70,70,229,0.08)';
  }
}
function handleSubmit() {
  const file = document.getElementById('fileInput').files[0];
  const op = document.querySelector('input[name="operation"]:checked');
  if (!file) {
    alert('Please select an image first.');
    return;
  }
  alert('Uploading: ' + file.name + '\nTransformation: ' + op.value);
}
</script>
