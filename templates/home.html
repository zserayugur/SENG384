<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Facial Image Analysis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8fcd4 50%, #f4f0ff 100%);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* --- Arka Plan Efektleri --- */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 320px; height: 320px; background: #b0b0ff; top: -80px; left: -80px; }
    .blob-2 { width: 260px; height: 260px; background: #a8f0c0; bottom: -60px; right: -60px; }
    .blob-3 { width: 180px; height: 180px; background: #ffd6f0; top: 40%; left: 10%; }

    /* --- Navigasyon --- */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      position: relative;
      z-index: 10;
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      height: 80px;
      transition: transform 0.3s ease;
    }

    .logo:hover { transform: scale(1.05); }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      text-decoration: none;
      color: #2a2a7a;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: #4646e5; }

    /* --- Ana İçerik --- */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 5;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      background: rgba(70, 70, 229, 0.1);
      color: #4646e5;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
      border: 1px solid rgba(70, 70, 229, 0.2);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      color: #2a2a7a;
      line-height: 1.2;
      margin-bottom: 15px;
    }

    p.subtitle {
      color: #6060aa;
      font-size: 16px;
      font-weight: 300;
      margin-bottom: 30px;
    }

    /* --- Grid Menü --- */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 900px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 22px;
      padding: 24px;
      text-decoration: none;
      color: #2a2a7a;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(70, 70, 229, 0.05);
    }

    .nav-btn:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 15px 40px rgba(70, 70, 229, 0.15);
      border-color: #4646e5;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      background: rgba(70, 70, 229, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4646e5;
      transition: all 0.3s ease;
    }

    .nav-btn:hover .btn-icon {
      background: #4646e5;
      color: white;
    }

    .btn-text {
      font-size: 14px;
      font-weight: 600;
    }

    /* --- Animasyonlar --- */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobil Uyumluluk */
    @media (max-width: 768px) {
      .menu-grid { grid-template-columns: 1fr 1fr; }
      nav { padding: 20px; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <nav>
    <img src="{{ url_for('static', filename='image/logo.png') }}" class="logo" alt="Logo">
    <div class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('upload_page') }}">Upload</a>
      <a href="{{ url_for('preview_page') }}">History</a>
      <a href="{{ url_for('result_page') }}" style="color: #ff6b6b;">Logout</a>
    </div>
  </nav>
    
  <div class="container">
    <div class="page-header">
      <div class="badge">AI-Powered Analysis</div>
      <h1>Facial Image Analysis System</h1>
      <p class="subtitle">Welcome to your workspace. Select an action to begin.</p>
    </div>

    <div class="menu-grid">
      <a class="nav-btn" href="{{ url_for('upload_page') }}">
        <div class="btn-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/></svg>
        </div>
        <span class="btn-text">Upload Screen</span>
      </a>

      <a class="nav-btn" href="{{ url_for('controls_page') }}">
        <div class="btn-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="btn-text">Controls/Profile</span>
      </a>

      <a class="nav-btn" href="{{ url_for('preview_page') }}">
        <div class="btn-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <span class="btn-text">Preview Screen</span>
      </a>

      <a class="nav-btn" href="{{ url_for('result_page') }}">
        <div class="btn-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <span class="btn-text">Result Screen</span>
      </a>

      <a class="nav-btn" href="{{ url_for('auth.login') }}">
        <div class="btn-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4m-7-9 5 5-5 5m5-5H3"/></svg>
        </div>
        <span class="btn-text">Login Page</span>
      </a>

      <a class="nav-btn" href="{{ url_for('auth.register') }}">
        <div class="btn-icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <span class="btn-text">Register Page</span>
      </a>
    </div>
  </div>

</body>
</html>
