<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview - Facial Image Analysis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8fcd4 50%, #f4f0ff 100%);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Arka Plan Efektleri */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 320px; height: 320px; background: #b0b0ff; top: -80px; left: -80px; }
    .blob-2 { width: 260px; height: 260px; background: #a8f0c0; bottom: -60px; right: -60px; }

    /* İçerik Alanı */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px; /* Navbar için üstten boşluk */
      width: 100%;
      z-index: 5;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      background: rgba(70, 70, 229, 0.1);
      color: #4646e5;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
      border: 1px solid rgba(70, 70, 229, 0.2);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      color: #2a2a7a;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #6060aa;
      font-size: 15px;
      font-weight: 300;
    }

    /* Görsel Grid Yapısı */
    .preview-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 20px 60px rgba(70, 70, 229, 0.1);
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 35px;
    }

    .image-box {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .image-box p {
      font-size: 12px;
      font-weight: 600;
      color: #6060aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .img-wrapper {
      width: 100%;
      aspect-ratio: 4/3;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(70, 70, 229, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .img-wrapper:hover {
      transform: scale(1.02);
      border-color: #4646e5;
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Buton */
    .nav-btn {
      width: fit-content;
      margin: 0 auto;
      padding: 14px 40px;
      border-radius: 14px;
      text-decoration: none;
      background: linear-gradient(135deg, #6060e5, #4646e5);
      color: white;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(70, 70, 229, 0.3);
    }

    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(70, 70, 229, 0.4);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .image-grid { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  {% include 'base.html' %}

  <div class="container">
    <div class="page-header">
      <div class="badge">Transformation Preview</div>
      <h1>Compare Results</h1>
      <p class="subtitle">Review the original image and the applied transformation.</p>
    </div>

    <div class="preview-card">
      <div class="image-grid">
        <div class="image-box">
          <p>Original Image</p>
          <div class="img-wrapper">
            <img src="{{ url_for('static', filename='uploads/original-placeholder.png') }}" alt="Original Preview">
          </div>
        </div>
        
        <div class="image-box">
          <p>Transformed Image</p>
          <div class="img-wrapper">
            <img src="{{ url_for('static', filename='uploads/transformed-placeholder.png') }}" alt="Transformed Preview">
          </div>
        </div>
      </div>

      <a class="nav-btn" href="{{ url_for('result_page') }}">
        Finalize Analysis
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
  </div>

</body>
</html>
